{{define "content"}}
<section class="auth-panel login-screen">
  <div class="panel auth-card">
    <div class="panel-head">
      <div>
        <h2>{{t "forgot_password"}}</h2>
        <p class="panel-note">{{t "password_forgot_summary"}}</p>
      </div>
    </div>
    {{if .Message}}<div class="notice error">{{.Message}}</div>{{end}}
    {{if .Sent}}
    <div class="notice">{{t "password_reset_email_sent"}}</div>
    <div class="form-actions full-span auth-actions">
      <a class="button-link" href="/login">{{t "back_login"}}</a>
    </div>
    {{else}}
    <form class="grid-form single-column" method="post" action="/password/forgot">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label>
        <span>{{t "email"}}</span>
        <input type="email" name="email" value="{{.Email}}" autocomplete="email" required autofocus>
      </label>
      <div class="form-actions full-span auth-actions">
        <button type="submit">{{t "send_password_reset"}}</button>
        <a class="button-link ghost-link" href="/login">{{t "back_login"}}</a>
      </div>
    </form>
    {{end}}
  </div>
</section>
{{end}}
