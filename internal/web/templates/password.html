{{define "content"}}
<section class="hero compact">
  <div>
    <h1>{{t "change_password"}}</h1>
    <p>{{t "change_password_summary"}}</p>
  </div>
</section>

{{if .Saved}}
<div class="system-notice tone-good" data-clear-url-params="saved">{{t "password_saved"}}</div>
{{end}}
{{if .Error}}
<div class="system-notice tone-bad">{{.Error}}</div>
{{end}}
{{if .NoticeError}}
<div class="system-notice tone-bad" data-clear-url-params="notice_error">{{.NoticeError}}</div>
{{end}}
{{if .ForceChange}}
<div class="system-notice tone-warn">{{t "password_change_required"}}</div>
{{end}}

<section class="panel narrow">
  <form class="grid-form" method="post" action="/profile/password">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <label class="full-span">
      <span>{{t "current_password"}}</span>
      {{template "passwordField" dict "Name" "current_password" "Autocomplete" "current-password" "Required" true}}
    </label>
    <label class="full-span">
      <span>{{t "new_password"}}</span>
      {{template "passwordField" dict "Name" "new_password" "Autocomplete" "new-password" "Required" true}}
    </label>
    <label class="full-span">
      <span>{{t "new_password_confirm"}}</span>
      {{template "passwordField" dict "Name" "new_password_confirm" "Autocomplete" "new-password" "Required" true}}
    </label>
    <div class="form-actions full-span">
      <button type="submit">{{t "save_password"}}</button>
      <a class="button-link ghost-link" href="/">{{t "cancel"}}</a>
    </div>
  </form>
</section>
{{end}}
