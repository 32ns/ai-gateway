{{define "content"}}
<section class="auth-panel login-screen">
  <div class="panel auth-card">
    <div class="panel-head">
      <div>
        <h2>{{t "reset_password"}}</h2>
        <p class="panel-note">{{t "password_reset_summary"}}</p>
      </div>
    </div>
    {{if .Message}}<div class="notice error">{{.Message}}</div>{{end}}
    {{if .ShowForm}}
    <form class="grid-form single-column" method="post" action="/password/reset">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <input type="hidden" name="token" value="{{.Token}}">
      <label>
        <span>{{t "new_password"}}</span>
        {{template "passwordField" dict "Name" "new_password" "Autocomplete" "new-password" "Required" true}}
      </label>
      <label>
        <span>{{t "new_password_confirm"}}</span>
        {{template "passwordField" dict "Name" "new_password_confirm" "Autocomplete" "new-password" "Required" true}}
      </label>
      <div class="form-actions full-span auth-actions">
        <button type="submit">{{t "save_password"}}</button>
        <a class="button-link ghost-link" href="/login">{{t "back_login"}}</a>
      </div>
    </form>
    {{else}}
    <div class="form-actions full-span auth-actions">
      <a class="button-link" href="/password/forgot">{{t "request_new_reset_link"}}</a>
      <a class="button-link ghost-link" href="/login">{{t "back_login"}}</a>
    </div>
    {{end}}
  </div>
</section>
{{end}}
